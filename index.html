        // ==========================================
        // ALGORITMA SHUFFLE (FISHER-YATES)
        // ==========================================
        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

            const shuffledQ = shuffleArray(rawQuestions);
            return shuffledQ.map(q => {
                if (q.type === 'mc') {
                    return { ...q, options: shuffleArray(q.options) };
                }
                return q;
            });
        };

        // ==========================================
        const App = () => {
            const [appState, setAppState] = useState('LOGIN'); // LOGIN, RESUME, EXAM, RESULT
            const [student, setStudent] = useState({ name: '', class: '', date: new Date().toISOString().split('T')[0] });
            const [examData, setExamData] = useState({
                questions: [],
                answers: {}, // { questionId: selectedValue }
                timeLeft: EXAM_DURATION_MINUTES * 60,
                violations: 0
            });
            const [currentIdx, setCurrentIdx] = useState(0);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [finalScore, setFinalScore] = useState(0);

            // Modal State
            const [modal, setModal] = useState({ isOpen: false, type: 'alert', message: '', onConfirm: null, onCancel: null });
            
            // Refs untuk Anti-Cheat agar mendapat nilai state terbaru di Event Listener
            const examDataRef = useRef(examData);
            const appStateRef = useRef(appState);
            const isSubmittingRef = useRef(isSubmitting);

            useEffect(() => {
                examDataRef.current = examData;
                appStateRef.current = appState;
                isSubmittingRef.current = isSubmitting;
                
                // Auto Save ke LocalStorage setiap kali examData berubah
                if (appState === 'EXAM') {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ student, examData }));
                }
            }, [examData, appState, student, isSubmitting]);

            // Cek Sesi Sebelumnya saat pertama dimuat
            useEffect(() => {
                const savedSession = localStorage.getItem(STORAGE_KEY);
                if (savedSession) {
                    setAppState('RESUME');
                }
            }, []);

            const showModal = useCallback((type, message, onConfirm = null, onCancel = null) => {
                setModal({
                    isOpen: true,
                    type,
                    message,
                    onConfirm: () => {
                        setModal(prev => ({ ...prev, isOpen: false }));
                        if (onConfirm) onConfirm();
                    },
                    onCancel: () => {
                        setModal(prev => ({ ...prev, isOpen: false }));
                        if (onCancel) onCancel();
                    }
                });
            }, []);

            // ==========================================
            // LOGIKA ANTI-CHEAT (Fullscreen & Blur)
            // ==========================================
            const triggerViolation = useCallback((reason) => {
                if (appStateRef.current !== 'EXAM' || isSubmittingRef.current) return;

                const currentV = examDataRef.current.violations + 1;
                setExamData(prev => ({ ...prev, violations: currentV }));

                if (currentV === 1) {
                    showModal('alert', `PERINGATAN 1: ${reason} Jika diulangi, ujian akan otomatis diakhiri dan dikumpulkan!`);
                } else if (currentV >= 2) {
                    showModal('alert', `PELANGGARAN 2: ${reason} Ujian dihentikan paksa!`);
                    setTimeout(() => handleSubmit(true), 2000); // Paksa kumpul
                }
            }, [showModal]);

            useEffect(() => {
                const handleVisibility = () => {
                    if (document.hidden && appStateRef.current === 'EXAM' && !modal.isOpen) {
                        triggerViolation("Terdeteksi berpindah Tab/Aplikasi lain.");
                    }
                };
                const handleFullscreen = () => {
                    if (!document.fullscreenElement && appStateRef.current === 'EXAM' && !modal.isOpen) {
                        triggerViolation("Terdeteksi keluar dari Mode Layar Penuh (Fullscreen).");
                    }
                };

                document.addEventListener('visibilitychange', handleVisibility);
                document.addEventListener('fullscreenchange', handleFullscreen);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibility);
                    document.removeEventListener('fullscreenchange', handleFullscreen);
                };
            }, [triggerViolation, modal.isOpen]);

            // ==========================================
            // LOGIKA TIMER
            // ==========================================
            useEffect(() => {
                let timerId;
                if (appState === 'EXAM' && examData.timeLeft > 0 && !isSubmitting) {
                    timerId = setInterval(() => {
                        setExamData(prev => {
                            if (prev.timeLeft <= 1) {
                                clearInterval(timerId);
                                showModal('alert', 'Waktu ujian telah habis!', () => handleSubmit(true));
                                return { ...prev, timeLeft: 0 };
                            }
                            return { ...prev, timeLeft: prev.timeLeft - 1 };
                        });
                    }, 1000);
                }
                return () => clearInterval(timerId);
            }, [appState, isSubmitting, showModal]);

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            // ==========================================
            // PENGELOLAAN UJIAN (Mulai, Lanjut, Jawab)
            // ==========================================
            const startExam = async () => {
                if (!student.name || !student.class) {
                    showModal('alert', 'Silakan lengkapi Nama dan Kelas terlebih dahulu.');
                    return;
                }
                
                try {
                    if (document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    }
                } catch (e) {
                    console.log("Fullscreen request diabaikan oleh browser");
                }

                setExamData({
                    questions: generateShuffledExam(),
                    answers: {},
                    timeLeft: EXAM_DURATION_MINUTES * 60,
                    violations: 0
                });
                setAppState('EXAM');
            };

            const resumeExam = async () => {
                const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
                setStudent(saved.student);
                setExamData(saved.examData);
                try {
                    if (document.documentElement.requestFullscreen) await document.documentElement.requestFullscreen();
                } catch (e) { }
                setAppState('EXAM');
            };

            const restartExam = () => {
                localStorage.removeItem(STORAGE_KEY);
                setAppState('LOGIN');
            };

            const handleAnswer = (questionId, answerValue) => {
                setExamData(prev => ({
                    ...prev,
                    answers: { ...prev.answers, [questionId]: answerValue }
                }));
            };

            // ==========================================
            // PENILAIAN & PENGIRIMAN DATA
            // ==========================================
            const handleSubmit = (force = false) => {
                const submitProcess = async () => {
                    setIsSubmitting(true);
                    
                    // Hitung Skor (Pilihan Ganda 2 poin, Isian Singkat 2 poin = Total Maks 100)
                    let totalScore = 0;
                    const { questions, answers } = examDataRef.current;
                    
                    questions.forEach(q => {
                        const userAnswer = answers[q.id];
                        if (!userAnswer) return;

                        if (q.type === 'mc') {
                            const selectedOption = q.options.find(opt => opt.text === userAnswer);
                            if (selectedOption && selectedOption.isCorrect) {
                                totalScore += 2;
                            }
                        } else if (q.type === 'short') {
                            if (userAnswer.toLowerCase().trim() === q.correctAnswer.toLowerCase()) {
                                totalScore += 2;
                            }
                        }
                    });

                    setFinalScore(totalScore);

                    // Payload JSON
                    const payload = {
                        nama: student.name,
                        kelas: student.class,
                        tanggal: student.date,
                        skor: totalScore,
                        pelanggaran: examDataRef.current.violations,
                        keterangan: force ? "Selesai Otomatis (Waktu/Pelanggaran)" : "Selesai Normal",
                        debug: JSON.stringify(answers)
                    };

                    try {
                        await fetch(GOOGLE_SHEETS_WEB_APP_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(payload)
                        });
                        // Sukses
                        if (document.fullscreenElement) {
                            document.exitFullscreen().catch(err => console.log(err));
                        }
                        localStorage.removeItem(STORAGE_KEY);
                        setAppState('RESULT');
                    } catch (error) {
                        showModal('alert', 'Gagal mengirim data. Pastikan internet Anda terhubung.');
                        setIsSubmitting(false);
                    }
                };

                if (force) {
                    submitProcess();
                } else {
                    showModal(
                        'confirm', 
                        'Apakah Anda yakin ingin mengumpulkan ujian ini? Pastikan semua soal telah terjawab.',
                        submitProcess
                    );
                }
            };

            // ==========================================
            // RENDER HALAMAN
            // ==========================================
            if (appState === 'LOGIN') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-900 to-blue-600 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">Portal CBT</h1>
                                <p className="text-blue-600 font-medium">Pendidikan Pancasila - Kelas VII</p>
                            </div>
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                                    <input type="text" value={student.name} onChange={e => setStudent({...student, name: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Masukkan nama lengkap" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Kelas</label>
                                    <input type="text" value={student.class} onChange={e => setStudent({...student, class: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Contoh: VII-A" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal Ujian</label>
                                    <input type="date" value={student.date} onChange={e => setStudent({...student, date: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
                                </div>
                                <button onClick={startExam} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg mt-6 transition duration-200">
                                    Mulai Ujian
                                </button>
                                <p className="text-xs text-center text-red-500 mt-4">
                                    *Pastikan menggunakan perangkat dengan baterai penuh. Anda akan masuk ke mode layar penuh.
                                </p>
                            </div>
                        </div>
                        <CustomModal {...modal} />
                    </div>
                );
            }

            if (appState === 'RESUME') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-900 to-blue-600 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
                            <IconUser className="w-16 h-16 text-blue-500 mx-auto mb-4" />
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">Sesi Ujian Ditemukan!</h2>
                            <p className="text-gray-600 mb-6">Kami mendeteksi Anda belum menyelesaikan ujian sebelumnya.</p>
                            <div className="space-y-3">
                                <button onClick={resumeExam} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                                    Lanjutkan Ujian
                                </button>
                                <button onClick={restartExam} className="w-full bg-red-100 hover:bg-red-200 text-red-700 font-bold py-3 px-4 rounded-lg transition duration-200">
                                    Mulai Ulang (Hapus Progres)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (appState === 'EXAM') {
                const currentQuestion = examData.questions[currentIdx];
                
                return (
                    <div className="h-screen flex flex-col bg-gray-50">
                        {/* Header */}
                        <header className="bg-white shadow-sm border-b px-6 py-3 flex justify-between items-center z-10">
                            <div className="flex items-center gap-4">
                                <div className="hidden md:block">
                                    <div className="font-bold text-gray-800 text-lg">{student.name}</div>
                                    <div className="text-sm text-gray-500">Kelas: {student.class}</div>
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <div className={`flex items-center gap-2 px-4 py-2 rounded-full font-bold text-lg ${examData.timeLeft < 300 ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-blue-50 text-blue-700'}`}>
                                    <IconClock /> {formatTime(examData.timeLeft)}
                                </div>
                                <button onClick={() => handleSubmit(false)} disabled={isSubmitting} className="bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg font-bold shadow transition">
                                    Selesai & Kumpul
                                </button>
                            </div>
                        </header>

                        {/* Main Body */}
                        <main className="flex-1 flex overflow-hidden">
                            {/* Kiri: Grid Navigasi */}
                            <div className="w-80 bg-white border-r shadow-sm flex flex-col hidden lg:flex">
                                <div className="p-4 border-b bg-gray-50 font-bold text-center text-gray-700">
                                    Navigasi Soal
                                </div>
                                <div className="p-4 flex-1 overflow-y-auto custom-scrollbar">
                                    <div className="grid grid-cols-5 gap-2">
                                        {examData.questions.map((q, i) => {
                                            const isAnswered = !!examData.answers[q.id];
                                            const isCurrent = i === currentIdx;
                                            let btnClass = "h-10 w-10 rounded-lg text-sm font-semibold border flex items-center justify-center transition ";
                                            
                                            if (isCurrent) {
                                                btnClass += "ring-2 ring-offset-1 ring-blue-500 bg-blue-500 text-white border-blue-500";
                                            } else if (isAnswered) {
                                                btnClass += "bg-blue-100 text-blue-800 border-blue-300";
                                            } else {
                                                btnClass += "bg-white text-gray-500 border-gray-300 hover:bg-gray-100";
                                            }

                                            return (
                                                <button key={i} onClick={() => setCurrentIdx(i)} className={btnClass}>
                                                    {i + 1}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                                <div className="p-4 border-t text-sm flex gap-4 justify-center bg-gray-50 text-gray-600">
                                    <div className="flex items-center gap-1"><div className="w-3 h-3 bg-white border rounded"></div> Belum</div>
                                    <div className="flex items-center gap-1"><div className="w-3 h-3 bg-blue-100 border border-blue-300 rounded"></div> Sudah</div>
                                </div>
                            </div>

                            {/* Kanan: Area Soal */}
                            <div className="flex-1 p-6 overflow-y-auto custom-scrollbar">
                                <div className="bg-white rounded-xl shadow-sm border p-8 max-w-4xl mx-auto">
                                    <div className="flex items-start gap-4 mb-6">
                                        <div className="bg-blue-600 text-white font-bold rounded-lg w-10 h-10 flex items-center justify-center shrink-0 text-xl">
                                            {currentIdx + 1}
                                        </div>
                                        <div className="text-lg text-gray-800 pt-1 leading-relaxed whitespace-pre-wrap">
                                            {currentQuestion.text}
                                        </div>
                                    </div>

                                    <div className="pl-14">
                                        {currentQuestion.type === 'mc' ? (
                                            <div className="space-y-3">
                                                {currentQuestion.options.map((opt, i) => {
                                                    const isSelected = examData.answers[currentQuestion.id] === opt.text;
                                                    // Generate label A, B, C, D
                                                    const label = String.fromCharCode(65 + i);
                                                    return (
                                                        <label key={i} className={`flex items-center gap-4 p-4 rounded-xl border cursor-pointer transition ${isSelected ? 'bg-blue-50 border-blue-500 ring-1 ring-blue-500' : 'border-gray-200 hover:bg-gray-50'}`}>
                                                            <input 
                                                                type="radio" 
                                                                name={`q-${currentQuestion.id}`} 
                                                                className="w-5 h-5 text-blue-600"
                                                                checked={isSelected}
                                                                onChange={() => handleAnswer(currentQuestion.id, opt.text)}
                                                            />
                                                            <div className="flex items-start gap-2">
                                                                <span className="font-bold text-gray-500">{label}.</span>
                                                                <span className="text-gray-700">{opt.text}</span>
                                                            </div>
                                                        </label>
                                                    );
                                                })}
                                            </div>
                                        ) : (
                                            <div className="mt-4">
                                                <input 
                                                    type="text" 
                                                    className="w-full border-2 border-gray-300 rounded-lg p-4 text-lg focus:border-blue-500 focus:ring-0 outline-none"
                                                    placeholder="Ketik jawaban singkat Anda di sini..."
                                                    value={examData.answers[currentQuestion.id] || ''}
                                                    onChange={(e) => handleAnswer(currentQuestion.id, e.target.value)}
                                                />
                                            </div>
                                        )}
                                    </div>

                                    {/* Navigasi Prev / Next */}
                                    <div className="flex justify-between mt-10 border-t pt-6">
                                        <button 
                                            onClick={() => setCurrentIdx(prev => Math.max(0, prev - 1))}
                                            disabled={currentIdx === 0}
                                            className="px-6 py-2 rounded-lg font-semibold bg-gray-200 text-gray-700 disabled:opacity-50 hover:bg-gray-300"
                                        >
                                            &larr; Sebelumnya
                                        </button>
                                        <button 
                                            onClick={() => setCurrentIdx(prev => Math.min(examData.questions.length - 1, prev + 1))}
                                            disabled={currentIdx === examData.questions.length - 1}
                                            className="px-6 py-2 rounded-lg font-semibold bg-blue-100 text-blue-700 disabled:opacity-50 hover:bg-blue-200"
                                        >
                                            Selanjutnya &rarr;
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </main>
                        
                        {/* Modal Overlay untuk Loading Submit / Peringatan / Konfirmasi */}
                        {isSubmitting && (
                            <div className="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm">
                                <div className="animate-spin rounded-full h-16 w-16 border-b-4 border-blue-600 mb-4"></div>
                                <p className="text-xl font-bold text-gray-800">Mengirim Jawaban...</p>
                            </div>
                        )}
                        <CustomModal {...modal} />
                    </div>
                );
            }

            if (appState === 'RESULT') {
                return (
                    <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-xl p-10 max-w-lg w-full text-center">
                            <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <IconCheck />
                            </div>
                            <h1 className="text-3xl font-bold text-gray-800 mb-2">Ujian Selesai!</h1>
                            <p className="text-gray-600 mb-8">Terima kasih, data jawaban Anda telah berhasil disimpan di server.</p>
                            
                            <div className="bg-gray-50 border rounded-xl p-6 mb-8 text-left">
                                <div className="flex justify-between mb-2">
                                    <span className="text-gray-500 font-medium">Nama</span>
                                    <span className="font-bold text-gray-800">{student.name}</span>
                                </div>
                                <div className="flex justify-between mb-2">
                                    <span className="text-gray-500 font-medium">Kelas</span>
                                    <span className="font-bold text-gray-800">{student.class}</span>
                                </div>
                                <div className="flex justify-between mb-2">
                                    <span className="text-gray-500 font-medium">Pelanggaran</span>
                                    <span className={`font-bold ${examData.violations > 0 ? 'text-red-500' : 'text-green-500'}`}>
                                        {examData.violations} kali
                                    </span>
                                </div>
                                <div className="flex justify-between pt-4 mt-4 border-t border-gray-200">
                                    <span className="text-gray-800 font-bold">Skor Akhir</span>
                                    <span className="font-bold text-2xl text-blue-600">{finalScore} / 100</span>
                                </div>
                            </div>

                            <button onClick={() => window.location.reload()} className="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-6 rounded-lg">
                                Kembali ke Beranda
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
